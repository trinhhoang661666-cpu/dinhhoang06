<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đình Hoàng zZ</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  background: url('https://i.imgur.com/8Km9tLL.jpg') no-repeat center/cover;
}

.overlay {
  backdrop-filter: blur(8px);
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center; /* thêm dòng này */
  justify-content: center;
}
.avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 3px solid #a855f7;
  box-shadow: 0 0 20px #a855f7;
  display: block;
  margin: 0 auto;
  object-fit: cover;      /* QUAN TRỌNG */
  object-position: center; /* QUAN TRỌNG */
}

.name {
  font-size: 24px;
  margin-top: 10px;
}

.links a {
  display: inline-block;
  margin: 10px;
  color: white;
  font-size: 20px;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="overlay">

<img src="https://i.postimg.cc/FHYcKdpM/1.jpg" class="avatar">

<div class="name">Đình Hoàng zZ</div>

<div class="links">
  <a href="https://www.facebook.com/share/14buU88ki52/" target="_blank">Facebook</a>
  <a href="https://www.tiktok.com/@isosobad06" target="_blank">TikTok</a>
  <a href="https://discord.gg/SrFZn7Tc3" target="_blank">Discord</a>
</div>

<audio id="music" autoplay loop muted>
  <source src="HAI THẰNG BỊP - SIX REMIX & ODIN MIX  Tau Ghét 2 Thằng Đó 🎵  Nhạc Hót TikTok 2026 Full Track - Đình Hiếu Mix (youtube).mp3" type="audio/mpeg">
</audio>

<script>
window.addEventListener("click", () => {
  const music = document.getElementById("music");
  music.muted = false;
  music.play();
});
</script>


</div>

</body>
</html>
