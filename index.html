<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đình Hoàng zZ</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  background: url('https://i.imgur.com/8Km9tLL.jpg') no-repeat center/cover;
}

/* blur nền */
.overlay {
  backdrop-filter: blur(8px);
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* avatar điện */
.avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 3px solid #a855f7;
  object-fit: cover;
  box-shadow: 0 0 20px #a855f7;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from { box-shadow: 0 0 10px #a855f7; }
  to { box-shadow: 0 0 35px #a855f7, 0 0 60px #9333ea; }
}

.name {
  font-size: 26px;
  margin-top: 10px;
}

/* mắt xem */
.views {
  margin-top: 5px;
  font-size: 14px;
  opacity: 0.8;
}

.qr {
  width:150px;
  margin-top:20px;
  border-radius:10px;
}

/* icon */
.social {
  display: flex;
  gap: 25px;
  margin-top: 20px;
}

.social a {
  width: 55px;
  height: 55px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  transition: 0.3s;
  box-shadow: 0 0 15px rgba(255,255,255,0.2);
}

.social i {
  font-size: 24px;
  color: white;
}

.social a:hover {
  transform: scale(1.15);
  background: rgba(255,255,255,0.2);
}

/* thanh nhạc */
.player {
  width: 250px;
  margin-top: 20px;
}

.progress {
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: #a855f7;
  transition: width 0.2s;
}
</style>
</head>

<body>

<div class="overlay">

<img src="https://i.postimg.cc/FHYcKdpM/1.jpg" class="avatar">

<div class="name">Đình Hoàng zZ</div>

<!-- mắt xem -->
<div class="views">
  <i class="fa fa-eye"></i> 12
</div>

<img src="https://i.postimg.cc/HLGc3pD4/21ab5800-86ff-498c-8590-4425065e1078.jpg" class="qr">

<!-- icon -->
<div class="social">
  <a href="https://www.facebook.com/share/14buU88ki52/" target="_blank">
    <i class="fab fa-facebook-f"></i>
  </a>
  <a href="https://www.tiktok.com/@isosobad06" target="_blank">
    <i class="fab fa-tiktok"></i>
  </a>
  <a href="https://discord.gg/NZMmmXSG6" target="_blank">
    <i class="fab fa-discord"></i>
  </a>
</div>

<!-- thanh nhạc -->
<div class="player">
  <div class="progress">
    <div class="progress-bar" id="bar"></div>
  </div>
</div>

<audio id="music" autoplay loop muted>
  <source src="HAI THẰNG BỊP - SIX REMIX & ODIN MIX  Tau Ghét 2 Thằng Đó 🎵  Nhạc Hót TikTok 2026 Full Track - Đình Hiếu Mix (youtube).mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("music");
const bar = document.getElementById("bar");

window.addEventListener("click", () => {
  music.muted = false;
  music.play();
});

music.addEventListener("timeupdate", () => {
  const percent = (music.currentTime / music.duration) * 100;
  bar.style.width = percent + "%";
});
</script>

</div>

</body>
</html>
</body>
</html>
