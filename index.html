<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đình Hoàng zZ</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  background: black;
}

/* nền blur */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url('https://i.postimg.cc/43fk3j7D/pngtree-neon-lit-tunnel-pink-purple-grid-background-futuristic-corridor-image-21189434.webp') no-repeat center/cover;
  filter: blur(20px) brightness(var(--bright, 0.6));
  transform: scale(1.1);
  z-index: -1;
  transition: 0.1s;
}

/* overlay */
.overlay {
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.3);
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* avatar điện */
.avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 3px solid #a855f7;
  object-fit: cover;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from { box-shadow: 0 0 10px #a855f7; }
  to { box-shadow: 0 0 40px #a855f7, 0 0 80px #ec4899; }
}

.name {
  font-size: 26px;
  margin-top: 10px;
}

.views {
  margin-top: 5px;
  font-size: 14px;
  opacity: 0.8;
}

.qr {
  width:150px;
  margin-top:20px;
  border-radius:10px;
}

/* icon */
.social {
  display: flex;
  gap: 25px;
  margin-top: 20px;
}

.social a {
  width: 55px;
  height: 55px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  transition: 0.3s;
  box-shadow: 0 0 15px rgba(255,255,255,0.2);
}

.social i {
  font-size: 24px;
  color: white;
}

.social a:hover {
  transform: scale(1.15);
}

/* thanh nhạc */
.player {
  width: 250px;
  margin-top: 20px;
}

.progress {
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #a855f7, #ec4899);
}
</style>
</head>

<body>

<div class="overlay">

<img src="https://i.postimg.cc/NLhGPYG1/51dc77f2-a143-4fae-b296-bfb1b71e97e2.jpg" class="avatar">

<div class="name">Đình Hoàng zZ</div>

<div class="views">
  <i class="fa fa-eye"></i> 12
</div>

<img src="https://i.postimg.cc/HLGc3pD4/21ab5800-86ff-498c-8590-4425065e1078.jpg" class="qr">

<div class="social">
  <a href="https://www.facebook.com/share/14buU88ki52/" target="_blank">
    <i class="fab fa-facebook-f"></i>
  </a>
  <a href="https://www.tiktok.com/@isosobad06" target="_blank">
    <i class="fab fa-tiktok"></i>
  </a>
  <a href="https://discord.gg/NZMmmXSG6" target="_blank">
    <i class="fab fa-discord"></i>
  </a>
</div>

<div class="player">
  <div class="progress">
    <div class="progress-bar" id="bar"></div>
  </div>
</div>

<audio id="music" loop>
  <source src="HAI THẰNG BỊP - SIX REMIX & ODIN MIX Tau Ghét 2 Thằng Đó 🎵 Nhạc Hót TikTok 2026 Full Track - Đình Hiếu Mix (youtube).mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("music");
const bar = document.getElementById("bar");

window.addEventListener("click", () => {
  music.play();

  // chạy thanh nhạc thôi, bỏ audioContext
  function update() {
    if (music.duration) {
      let percent = (music.currentTime / music.duration) * 100;
      bar.style.width = percent + "%";
    }
    requestAnimationFrame(update);
  }

  update();
});
</script>

</div>

</body>
</html>
